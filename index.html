<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Ad Spy Tool - Real-Time Competitor Intelligence</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1877f2 0%, #0e5fd8 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            font-size: 36px;
            color: #1877f2;
            margin-bottom: 10px;
        }
        
        .search-section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .search-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: #1877f2;
            box-shadow: 0 0 0 4px rgba(24, 119, 242, 0.1);
        }
        
        .btn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #1877f2, #0e5fd8);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(24, 119, 242, 0.3);
        }
        
        .filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: 10px 20px;
            background: #f0f2f5;
            border: 2px solid #e4e6eb;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: #1877f2;
            color: white;
            border-color: #1877f2;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .stat-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1877f2, #0e5fd8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 15px;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: #65676b;
            font-size: 14px;
        }
        
        .ads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }
        
        .ad-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }
        
        .ad-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }
        
        .ad-image {
            width: 100%;
            height: 200px;
            background: #f0f2f5;
            position: relative;
            overflow: hidden;
        }
        
        .ad-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .ad-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #42b72a;
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .ad-badge.hot {
            background: #ff4444;
        }
        
        .ad-content {
            padding: 20px;
        }
        
        .ad-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .company-logo {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #e4e6eb;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        
        .company-info {
            flex: 1;
        }
        
        .company-name {
            font-weight: 700;
            color: #1a1a1a;
        }
        
        .ad-age {
            font-size: 12px;
            color: #65676b;
        }
        
        .ad-text {
            color: #1a1a1a;
            line-height: 1.6;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .ad-cta {
            background: #1877f2;
            color: white;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 15px;
        }
        
        .ad-stats {
            display: flex;
            justify-content: space-around;
            padding-top: 15px;
            border-top: 1px solid #e4e6eb;
        }
        
        .ad-stat {
            text-align: center;
        }
        
        .ad-stat-value {
            font-weight: 700;
            color: #1877f2;
        }
        
        .ad-stat-label {
            font-size: 11px;
            color: #65676b;
        }
        
        .ad-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        
        .action-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e4e6eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .action-btn:hover {
            background: #f0f2f5;
            border-color: #1877f2;
        }
        
        .insights-panel {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .insight-item {
            display: flex;
            align-items: start;
            gap: 15px;
            padding: 15px;
            background: #f0f2f5;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        
        .insight-icon {
            width: 40px;
            height: 40px;
            background: #1877f2;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            flex-shrink: 0;
        }
        
        .insight-text {
            flex: 1;
        }
        
        .insight-title {
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 5px;
        }
        
        .insight-desc {
            color: #65676b;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Header -->
    <div class="header">
        <h1>🔍 Facebook Ad Spy Tool</h1>
        <p style="color: #65676b;">Track competitor ads in real-time • Get winning strategies • Boost your ROAS</p>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <div class="search-box">
            <input type="text" class="search-input" id="searchInput" placeholder="Enter competitor name or Facebook page URL...">
            <button class="btn" onclick="searchAds()">
                🔍 Search Ads
            </button>
            <button class="btn" style="background: #42b72a;" onclick="exportData()">
                📥 Export All
            </button>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" data-filter="all">All Ads</button>
            <button class="filter-btn" data-filter="active">Active Only</button>
            <button class="filter-btn" data-filter="video">Video Ads</button>
            <button class="filter-btn" data-filter="image">Image Ads</button>
            <button class="filter-btn" data-filter="carousel">Carousel</button>
            <button class="filter-btn" data-filter="new">New (7 days)</button>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-value" id="totalAds">0</div>
            <div class="stat-label">Total Active Ads</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">🔥</div>
            <div class="stat-value" id="newAds">0</div>
            <div class="stat-label">New This Week</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">📈</div>
            <div class="stat-value" id="avgDuration">0</div>
            <div class="stat-label">Avg. Ad Duration (Days)</div>
        </div>
        
        <div class="stat-card">
            <div class="stat-icon">💰</div>
            <div class="stat-value" id="estSpend">$0</div>
            <div class="stat-label">Est. Monthly Spend</div>
        </div>
    </div>

    <!-- Ads Grid -->
    <div class="ads-grid" id="adsGrid">
        <!-- Ads will be populated here -->
    </div>

    <!-- AI Insights Panel -->
    <div class="insights-panel">
        <h2 style="margin-bottom: 20px;">🤖 AI-Powered Insights</h2>
        <div id="insightsContainer">
            <!-- Insights will be populated here -->
        </div>
    </div>
</div>

<script>
// Sample data (In production, this comes from Facebook Ads Library API)
const sampleAds = [
    {
        id: 1,
        company: "Nike",
        logo: "N",
        headline: "Just Do It - New Air Max Collection",
        text: "Discover the latest Air Max styles. Free shipping on orders over $50. Limited time offer - Shop now and save 20% on your first purchase!",
        cta: "Shop Now",
        image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400",
        format: "video",
        daysRunning: 47,
        isNew: false,
        reach: "2.5M",
        engagement: "8.2%",
        estSpend: "$45K"
    },
    {
        id: 2,
        company: "Shopify",
        logo: "S",
        headline: "Start Your Online Business Today",
        text: "Join over 2 million entrepreneurs who trust Shopify. Try free for 14 days. No credit card required. Build your empire from scratch!",
        cta: "Start Free Trial",
        image: "https://images.unsplash.com/photo-1460925895917-afdab827c52f?w=400",
        format: "image",
        daysRunning: 12,
        isNew: true,
        reach: "1.8M",
        engagement: "5.7%",
        estSpend: "$28K"
    },
    {
        id: 3,
        company: "HubSpot",
        logo: "H",
        headline: "Grow Better With HubSpot CRM",
        text: "All your marketing, sales, and service tools in one powerful platform. Trusted by 150,000+ businesses. Get started free!",
        cta: "Get Started Free",
        image: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=400",
        format: "carousel",
        daysRunning: 89,
        isNew: false,
        reach: "3.2M",
        engagement: "6.4%",
        estSpend: "$67K"
    },
    {
        id: 4,
        company: "Canva",
        logo: "C",
        headline: "Design Anything. Publish Anywhere.",
        text: "Create professional designs in minutes with Canva Pro. 100M+ premium photos, videos & graphics. Try Canva Pro free for 30 days!",
        cta: "Try Canva Pro",
        image: "https://images.unsplash.com/photo-1561070791-2526d30994b5?w=400",
        format: "video",
        daysRunning: 34,
        isNew: false,
        reach: "4.1M",
        engagement: "9.1%",
        estSpend: "$52K"
    },
    {
        id: 5,
        company: "Grammarly",
        logo: "G",
        headline: "Write With Confidence",
        text: "Eliminate grammar errors, write clearly and professionally. Trusted by 30M+ users worldwide. Premium features unlock better writing.",
        cta: "Get Grammarly",
        image: "https://images.unsplash.com/photo-1455390582262-044cdead277a?w=400",
        format: "image",
        daysRunning: 156,
        isNew: false,
        reach: "5.8M",
        engagement: "7.3%",
        estSpend: "$89K"
    },
    {
        id: 6,
        company: "Skillshare",
        logo: "SK",
        headline: "Learn Creative Skills Online",
        text: "Thousands of classes on design, photography, business & more. Join 12M+ students learning new skills. Get 30% off annual membership!",
        cta: "Start Learning",
        image: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=400",
        format: "video",
        daysRunning: 23,
        isNew: true,
        reach: "1.9M",
        engagement: "6.8%",
        estSpend: "$31K"
    }
];

// Initialize
window.addEventListener('DOMContentLoaded', function() {
    renderAds(sampleAds);
    updateStats(sampleAds);
    generateInsights(sampleAds);
    setupFilters();
});

// Render Ads
function renderAds(ads) {
    const grid = document.getElementById('adsGrid');
    grid.innerHTML = ads.map(ad => `
        <div class="ad-card" data-format="${ad.format}">
            <div class="ad-image">
                <img src="${ad.image}" alt="${ad.headline}">
                <span class="ad-badge ${ad.isNew ? 'hot' : ''}">${ad.isNew ? '🔥 NEW' : ad.daysRunning + ' days'}</span>
            </div>
            
            <div class="ad-content">
                <div class="ad-header">
                    <div class="company-logo">${ad.logo}</div>
                    <div class="company-info">
                        <div class="company-name">${ad.company}</div>
                        <div class="ad-age">Running for ${ad.daysRunning} days</div>
                    </div>
                </div>
                
                <h3 style="font-size: 16px; margin-bottom: 10px;">${ad.headline}</h3>
                <div class="ad-text">${ad.text}</div>
                
                <div class="ad-cta">${ad.cta}</div>
                
                <div class="ad-stats">
                    <div class="ad-stat">
                        <div class="ad-stat-value">${ad.reach}</div>
                        <div class="ad-stat-label">Reach</div>
                    </div>
                    <div class="ad-stat">
                        <div class="ad-stat-value">${ad.engagement}</div>
                        <div class="ad-stat-label">Engagement</div>
                    </div>
                    <div class="ad-stat">
                        <div class="ad-stat-value">${ad.estSpend}</div>
                        <div class="ad-stat-label">Est. Spend</div>
                    </div>
                </div>
                
                <div class="ad-actions">
                    <button class="action-btn" onclick="viewDetails(${ad.id})">👁️ Details</button>
                    <button class="action-btn" onclick="downloadAd(${ad.id})">📥 Save</button>
                    <button class="action-btn" onclick="analyzeAd(${ad.id})">🔬 Analyze</button>
                </div>
            </div>
        </div>
    `).join('');
}

// Update Stats
function updateStats(ads) {
    const totalAds = ads.length;
    const newAds = ads.filter(ad => ad.isNew).length;
    const avgDuration = Math.round(ads.reduce((sum, ad) => sum + ad.daysRunning, 0) / ads.length);
    const totalSpend = ads.reduce((sum, ad) => sum + parseInt(ad.estSpend.replace(/[$K]/g, '')) * 1000, 0);
    
    document.getElementById('totalAds').textContent = totalAds;
    document.getElementById('newAds').textContent = newAds;
    document.getElementById('avgDuration').textContent = avgDuration;
    document.getElementById('estSpend').textContent = '$' + (totalSpend / 1000).toFixed(0) + 'K';
}

// Generate AI Insights
function generateInsights(ads) {
    const insights = [
        {
            icon: "🎯",
            title: "Top Performing Format",
            desc: "Video ads have 2.3x higher engagement than static images. 67% of top ads use video format."
        },
        {
            icon: "📝",
            title: "Winning Copy Pattern",
            desc: "Most successful ads use 'benefit + social proof + urgency' formula. Average copy length: 125 words."
        },
        {
            icon: "⏰",
            title: "Optimal Launch Time",
            desc: "67% of new ads launch on Monday 9-11 AM EST. This timing shows 34% better performance."
        },
        {
            icon: "💰",
            title: "Budget Insight",
            desc: "Top performers spend avg. $45K-70K/month. Ads running 45+ days indicate profitability."
        },
        {
            icon: "🎨",
            title: "Creative Pattern",
            desc: "89% winning ads show human faces. Bright colors (red, blue, yellow) increase CTR by 41%."
        },
        {
            icon: "📊",
            title: "CTA Analysis",
            desc: "'Shop Now' (34% of ads), 'Learn More' (28%), 'Get Started' (19%) are top 3 CTAs."
        }
    ];
    
    const container = document.getElementById('insightsContainer');
    container.innerHTML = insights.map(insight => `
        <div class="insight-item">
            <div class="insight-icon">${insight.icon}</div>
            <div class="insight-text">
                <div class="insight-title">${insight.title}</div>
                <div class="insight-desc">${insight.desc}</div>
            </div>
        </div>
    `).join('');
}

// Setup Filters
function setupFilters() {
    const filterButtons = document.querySelectorAll('.filter-btn');
    filterButtons.forEach(btn => {
        btn.addEventListener('click', function() {
            filterButtons.forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            const filter = this.dataset.filter;
            filterAds(filter);
        });
    });
}

// Filter Ads
function filterAds(filter) {
    let filtered = sampleAds;
    
    if (filter === 'active') {
        filtered = sampleAds.filter(ad => ad.daysRunning > 30);
    } else if (filter === 'new') {
        filtered = sampleAds.filter(ad => ad.isNew);
    } else if (filter !== 'all') {
        filtered = sampleAds.filter(ad => ad.format === filter);
    }
    
    renderAds(filtered);
    updateStats(filtered);
}

// Search Function
function searchAds() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    if (!query) {
        alert('Please enter a company name or URL');
        return;
    }
    
    const filtered = sampleAds.filter(ad => 
        ad.company.toLowerCase().includes(query) ||
        ad.headline.toLowerCase().includes(query) ||
        ad.text.toLowerCase().includes(query)
    );
    
    if (filtered.length === 0) {
        alert('No ads found. Try another search term.');
        renderAds(sampleAds);
    } else {
        renderAds(filtered);
        updateStats(filtered);
    }
}

// Export Data
function exportData() {
    const csvContent = "Company,Headline,CTA,Days Running,Reach,Engagement,Est. Spend\n" +
        sampleAds.map(ad => 
            `"${ad.company}","${ad.headline}","${ad.cta}",${ad.daysRunning},"${ad.reach}","${ad.engagement}","${ad.estSpend}"`
        ).join('\n');
    
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'facebook-ads-data.csv';
    a.click();
    
    alert('✅ Data exported successfully!');
}

// View Details
function viewDetails(adId) {
    const ad = sampleAds.find(a => a.id === adId);
    alert(`Ad Details:\n\nCompany: ${ad.company}\nHeadline: ${ad.headline}\nFormat: ${ad.format}\nDays Running: ${ad.daysRunning}\nReach: ${ad.reach}\nEngagement: ${ad.engagement}\n\nThis would open a detailed modal in production version.`);
}

// Download Ad
function downloadAd(adId) {
    alert('✅ Ad saved to your library!\n\nIn production version, this would:\n- Download ad creative\n- Save ad copy\n- Save landing page screenshot\n- Add to your swipe file');
}

// Analyze Ad
function analyzeAd(adId) {
    const ad = sampleAds.find(a => a.id === adId);
    alert(`🔬 AI Analysis:\n\nCopy Score: 87/100\n✅ Clear value proposition\n✅ Strong CTA\n✅ Social proof included\n⚠️ Could add more urgency\n\nCreative Score: 92/100\n✅ Eye-catching visuals\n✅ Brand colors used\n✅ Professional quality\n\nPredicted Performance: HIGH\nEst. CTR: ${ad.engagement}\nEst. Conversion Rate: 3.2%`);
}
</script>

</body>
</html>
